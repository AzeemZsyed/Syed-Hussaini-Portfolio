<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Az — Resume</title>
    <link rel="stylesheet" href="Style.css">
    <style>
      .resume-cta {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
        text-align: center;
        gap: 32px;
      }
      .resume-label {
        font-size: 11px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: #555;
      }
      .resume-download {
        font-size: 52px;
        font-weight: 1000;
        color: transparent;
        -webkit-text-stroke: 1.5px #fff;
        text-transform: uppercase;
        letter-spacing: 8px;
        text-decoration: none;
        transition: all 0.3s;
      }
      .resume-download:hover {
        color: #fff;
        -webkit-text-stroke: 0px;
      }
      .resume-sub {
        font-size: 11px;
        color: #333;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
    </style>
</head>
<body>

  <div class="resume-cta">
    <p class="resume-label">Syed Azeemuddin Hussaini</p>
    <!-- Replace href with your actual resume PDF link -->
    <a class="resume-download" href="Syed_Hussaini_Resume.pdf" download>Download CV</a>
    <p class="resume-sub">Software Engineering Co-op &nbsp;·&nbsp; University of Guelph</p>
  </div>

  <script src="Background.js"></script>
</body>
</html>
